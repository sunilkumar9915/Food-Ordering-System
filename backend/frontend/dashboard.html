<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Food Ordering Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }
        
        body {
            background: #f5f7fb;
        }
        
        header {
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            font-size: 28px;
        }
        
        #username {
            font-size: 18px;
            font-weight: bold;
        }
        
        nav {
            padding: 15px;
            background: white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .1);
            text-align: center;
        }
        
        nav button {
            margin: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            background: #2575fc;
            color: white;
            transition: .3s;
        }
        
        nav button:hover {
            background: #ff6b00;
            transform: scale(1.05);
        }
        
        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 25px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .price {
            color: green;
            font-size: 20px;
            font-weight: bold;
        }
        
        .action {
            margin-top: 15px;
        }
        
        .action button {
            margin-right: 8px;
        }
        
        #foodForm input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        
        #foodForm button {
            margin-top: 10px;
            padding: 10px 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #2575fc;
            color: white;
            font-weight: bold;
        }
        
        #foodForm button:hover {
            background: #ff6b00;
        }
        
        #foodForm {
            max-width: 500px;
            margin: auto;
        }
        
        #foodForm input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        
        #foodForm button {
            padding: 10px 18px;
            margin-right: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2575fc;
            color: white;
            font-size: 16px;
        }
        
        #foodForm button:hover {
            background: #ff6b00;
        }
        /* ===========================
   TOP RATED FOODS
=========================== */
        
        .topRatedFoods {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
        }
        
        .topCard {
            width: 230px;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
            transition: .3s;
            text-align: center;
            padding-bottom: 15px;
        }
        
        .topCard:hover {
            transform: translateY(-8px);
        }
        
        .topCard img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .topCard h3 {
            margin: 10px 0;
        }
        
        .topCard p {
            color: #555;
        }
        
        .topCard h4 {
            color: #ff5722;
            margin: 10px 0;
        }
        
        .topCard button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .topCard button:hover {
            background: #1d4ed8;
        }
        /* ===========================
   DASHBOARD ANALYTICS
=========================== */
        
        .analyticsSection {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 25px 0;
        }
        
        .analyticsCard {
            width: 220px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
            transition: .3s;
        }
        
        .analyticsCard:hover {
            transform: translateY(-8px);
        }
        
        .analyticsCard h2 {
            font-size: 34px;
            color: #2563eb;
            margin-bottom: 10px;
        }
        
        .analyticsCard p {
            font-size: 18px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <header>

        <h1>🍔 Food Ordering Dashboard</h1>

        <div id="username">

            Welcome User

        </div>

    </header>
    <nav>
        <div id="foodForm" style="display:none; padding:20px; background:white; margin:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,.2);">

            <h2>Add New Food</h2>

            <input id="foodName" type="text" placeholder="Food Name"><br><br>

            <input id="foodDescription" type="text" placeholder="Description"><br><br>

            <input id="foodPrice" type="number" placeholder="Price"><br><br>

            <input id="foodCategory" type="text" placeholder="Category"><br><br>

            <label>Food Image</label><br>
            <input type="file" id="foodImage" accept="image/*"><br><br>

            <button onclick="saveFood()">💾 Save Food</button>

            <button onclick="closeForm()">❌ Cancel</button>

        </div>

        <button onclick="getFoods()">
        🍔 Foods
    </button>

        <button onclick="addFood()">
        ➕ Add Food
    </button>

        <button onclick="searchFood()">
        🔍 Search Food
    </button>
        <button onclick="window.location.href='wishlist.html'">
    ❤️ Wishlist
</button>
        <button onclick="showCart()">
        🛒 Cart
    </button>

        <button onclick="getOrders()">
        📦 My Orders
    </button>

        <button onclick="logout()">
        🚪 Logout
    </button>

    </nav>
    <div id="analyticsSection" class="analyticsSection">

        <div class="analyticsCard">
            <h2 id="totalUsers">0</h2>
            <p>👥 Users</p>
        </div>

        <div class="analyticsCard">
            <h2 id="totalFoods">0</h2>
            <p>🍔 Foods</p>
        </div>

        <div class="analyticsCard">
            <h2 id="totalOrders">0</h2>
            <p>📦 Orders</p>
        </div>

        <div class="analyticsCard">
            <h2 id="totalRevenue">₹0</h2>
            <p>💰 Revenue</p>
        </div>

    </div>

    <div id="updateFoodForm" style="display:none; padding:20px; background:white; margin:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,.2);">

        <h2>Update Food</h2>

        <input type="hidden" id="updateFoodId">

        <input id="updateFoodName" type="text" placeholder="Food Name"><br><br>

        <input id="updateFoodDescription" type="text" placeholder="Description"><br><br>

        <input id="updateFoodPrice" type="number" placeholder="Price"><br><br>

        <input id="updateFoodCategory" type="text" placeholder="Category"><br><br>

        <label>New Food Image</label><br>
        <input type="file" id="updateFoodImage" accept="image/*"><br><br>

        <button onclick="saveUpdatedFood()">💾 Update Food</button>

        <button onclick="closeUpdateForm()">❌ Cancel</button>

    </div>



    <div class="topBar">

        <input type="text" id="search" placeholder="🔍 Search Food..." onkeyup="filterFoods()">

        <select id="category" onchange="filterFoods()">

    <option value="">All Categories</option>

    <option value="Fruit">🍎 Fruit</option>

    <option value="Fast Food">🍔 Fast Food</option>

    <option value="Fast food">🍟 Fast food (Old Data)</option>

</select>
    </div>
    <h2>⭐ Top Rated Foods</h2>

    <div id="topRatedFoods" class="topRatedFoods"></div>

    <hr><br>

    <div id="container"></div>


    <script>
        const token = localStorage.getItem("token");
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let allFoods = [];

        const user = JSON.parse(localStorage.getItem("user"));

        if (user) {

            document.getElementById("username").innerHTML = "👋 Welcome, " + user.name;

        }
        async function getFoods() {

            const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods");
            if (!res.ok) {
                alert("Server Error");
                return;
            }

            const data = await res.json();
            allFoods = data.foods;
            let html = "";

            data.foods.forEach(food => {

                        html += `

        <div class="card">

            <h2>🍔 ${food.name}</h2>
            ${food.image ? `
            <img src="${food.image}"
           style="width:100%;height:200px;object-fit:cover;border-radius:10px;margin:10px 0;">
             ` : ""}
            

            <p>${food.description}</p>

            <p class="price">₹${food.price}</p>

            <p><b>Category :</b> ${food.category}</p>

            <br>

            <div class="action">
                <button onclick="viewFood('${food._id}')">

    👁 View Details

</button>

           <button onclick="addToCart('${food._id}','${food.name}',${food.price},'${food.image}')">
             🛒 Add To Cart
            </button>

            

            <button onclick="updateFood('${food._id}')">

            ✏ Update

            </button>

            <button onclick="deleteFood('${food._id}')">

            🗑 Delete

            </button>

            </div>

        </div>

        `;

            });

            document.getElementById("container").innerHTML = html;

        }
        async function loadTopRatedFoods() {

    try {

        const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods/top-rated");
        const data = await res.json();

        if (!data.success) return;

        const container = document.getElementById("topRatedFoods");

        let html = "";

        data.foods.forEach(food => {

            html += `
            <div class="topCard">

                <img src="${food.image}">

                <h3>${food.name}</h3>

                <p>⭐ ${food.averageRating} (${food.totalReviews} Reviews)</p>

                <h4>₹${food.price}</h4>

                <button onclick="viewFood('${food._id}')">
                    👁 View Details
                </button>

            </div>
            `;

        });

        container.innerHTML = html;

    } catch (error) {

        console.log(error);

    }

}
async function loadDashboardAnalytics() {

    try {

        const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods/dashboard");

        const data = await res.json();

        if (!data.success) return;

        document.getElementById("totalUsers").innerHTML = data.totalUsers;

        document.getElementById("totalFoods").innerHTML = data.totalFoods;

        document.getElementById("totalOrders").innerHTML = data.totalOrders;

        document.getElementById("totalRevenue").innerHTML = "₹" + data.revenue;

    } catch (error) {

        console.log(error);

    }

}
        function filterFoods() {

    const search = document.getElementById("search").value.toLowerCase();

    const category = document.getElementById("category").value;

    const filteredFoods = allFoods.filter(food => {

        const matchName = food.name.toLowerCase().includes(search);

       const matchCategory =
    category === "" ||
    food.category.toLowerCase() === category.toLowerCase();

        return matchName && matchCategory;

    });

    let html = "";

    filteredFoods.forEach(food => {

        html += `

        <div class="card">

            <h2>🍔 ${food.name}</h2>

            ${food.image ? `
            <img src="${food.image}"
            style="width:100%;height:200px;object-fit:cover;border-radius:10px;margin:10px 0;">
            ` : ""}

            <p>${food.description}</p>

            <p class="price">₹${food.price}</p>

            <p><b>Category :</b> ${food.category}</p>

            <br>

            <div class="action">
                <button onclick="viewFood('${food._id}')">
                👁 View Details
                </button>

                <button onclick="addToCart('${food._id}','${food.name}',${food.price},'${food.image}')">

                    🛒 Add To Cart

                </button>

                <button onclick="updateFood('${food._id}')">

                    ✏ Update

                </button>

                <button onclick="deleteFood('${food._id}')">

                    🗑 Delete

                </button>

            </div>

        </div>

        `;

    });

    document.getElementById("container").innerHTML = html;

}

        function addFood() {
            document.getElementById("foodForm").style.display = "block";
        }

        function closeForm() {
            document.getElementById("foodForm").style.display = "none";
        }
        async function deleteFood(id) {

            if (!confirm("Delete this food?")) return;

            const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods/" + id, {
                method: "DELETE"
            });

            if (!res.ok) {
                alert("Server Error");
                return;
            }

            const data = await res.json();

            alert(data.message || "Deleted");

            getFoods();

        }

        async function updateFood(id) {

    const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods");

    const data = await res.json();

    const food = data.foods.find(f => f._id === id);

    if (!food) {
        alert("Food not found");
        return;
    }

    document.getElementById("updateFoodId").value = food._id;
    document.getElementById("updateFoodName").value = food.name;
    document.getElementById("updateFoodDescription").value = food.description;
    document.getElementById("updateFoodPrice").value = food.price;
    document.getElementById("updateFoodCategory").value = food.category;

    document.getElementById("updateFoodForm").style.display = "block";
}
function closeUpdateForm() {
    document.getElementById("updateFoodForm").style.display = "none";
}

        function addToCart(id, name, price, image) {

    const item = cart.find(food => food.id === id);

    if (item) {

        item.quantity++;

    } else {

        cart.push({

            id,
            name,
            price,
            image,
            quantity: 1

        });

    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " Added To Cart");

}

        async function placeOrder(foodId, price) {
            console.log("TOKEN =", token);

            const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/orders", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },

                body: JSON.stringify({

                    items: [{
                        food: foodId,
                        quantity: 1
                    }],

                    totalAmount: price

                })

            });

            if (!res.ok) {
                alert("Server Error");
                return;
            }

            const data = await res.json();

            alert(data.message || "Order Placed");

        }

        function logout() {

    localStorage.clear();

    window.location.href = "index.html";

}

getFoods();
loadTopRatedFoods();
loadDashboardAnalytics();

function showCart() {

            let html = "";

            if (cart.length === 0) {

                html = `
        <div class="card">
            <h2>🛒 Cart Empty</h2>
            <p>No food added.</p>
        </div>
        `;

                document.getElementById("container").innerHTML = html;
                return;
            }

            let total = 0;

            cart.forEach((food, index) => {

                total += food.price * food.quantity;

                html += `
        <div class="card">

            <h2>${food.name}</h2>

            <p>Price : ₹${food.price}</p>

            <p>Quantity : ${food.quantity}</p>

            <p>Total : ₹${food.price * food.quantity}</p>

            <button onclick="increaseQuantity(${index})">➕</button>

            <button onclick="decreaseQuantity(${index})">➖</button>

            <button onclick="removeFromCart(${index})">🗑 Remove</button>

        </div>
        `;
            });

            html += `
    <div class="card">
        <h2>Grand Total : ₹${total}</h2>

        <button onclick="checkout()">
        ✅ Checkout
        </button>

    </div>
    `;

            document.getElementById("container").innerHTML = html;
        }

        function increaseQuantity(index) {

            cart[index].quantity++;

            showCart();

        }

        function decreaseQuantity(index) {

            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            }

            showCart();

        }

        function removeFromCart(index) {

            cart.splice(index, 1);

            showCart();

        }
        async function checkout() {

            if (cart.length === 0) {
                alert("Cart is Empty");
                return;
            }

            let items = [];
            let totalAmount = 0;

            cart.forEach(food => {

                items.push({
                    food: food.id,
                    quantity: food.quantity
                });

                totalAmount += food.price * food.quantity;

            });

            const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/orders", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },

                body: JSON.stringify({
                    items,
                    totalAmount
                })

            });

            const data = await res.json();

            alert(data.message);

            cart = [];

            getOrders();

        }

        async function getOrders() {

            const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/orders", {

                headers: {
                    "Authorization": "Bearer " + token
                }

            });

            if (!res.ok) {
                alert("Server Error");
                return;
            }

            const data = await res.json();

            let html = "";

            data.orders.forEach(order => {

                html += `

        <div class="card">

            <h2>📦 Order</h2>

            <p><b>Order ID :</b><br>${order._id}</p>

            <p><b>Status :</b>
            <span style="color:green;font-weight:bold">
            ${order.status}
            </span>
            </p>

            <p class="price">
            ₹${order.totalAmount}
            </p>

        </div>

        `;

            });

            document.getElementById("container").innerHTML = html;

        }
        // ================= SEARCH FOOD =================

        async function searchFood() {

            const keyword = prompt("Enter Food Name");

            if (!keyword) return;

            const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods");

            if (!res.ok) {
                alert("Server Error");
                return;
            }

            const data = await res.json();

            const foods = data.foods.filter(food =>
                food.name.toLowerCase().includes(keyword.toLowerCase())
            );

            let html = "";

            if (foods.length === 0) {

                html = `
        <div class="card">
            <h2>❌ No Food Found</h2>
        </div>
        `;

            } else {

                foods.forEach(food => {

                    html += `
            <div class="card">

                <h2>🍔 ${food.name}</h2>

                <p>${food.description}</p>

                <p class="price">₹${food.price}</p>

                <p><b>Category :</b> ${food.category}</p>

                <br>

                <div class="action">

                    <button onclick="addToCart('${food._id}','${food.name}',${food.price})">
                    🛒 Add To Cart
                    </button>

                    <button onclick="updateFood('${food._id}')">
                    ✏ Update
                    </button>

                    <button onclick="deleteFood('${food._id}')">
                    🗑 Delete
                    </button>

                </div>

            </div>
            `;
                });

            }

            document.getElementById("container").innerHTML = html;

        }
        async function saveFood() {

            const name = document.getElementById("foodName").value;
            const description = document.getElementById("foodDescription").value;
            const price = document.getElementById("foodPrice").value;
            const category = document.getElementById("foodCategory").value;
            const image = document.getElementById("foodImage").files[0];

            if (!name || !description || !price || !category) {

                alert("Fill all fields");
                return;

            }

            const formData = new FormData();

            formData.append("name", name);
            formData.append("description", description);
            formData.append("price", price);
            formData.append("category", category);

            if (image) {
                formData.append("image", image);
            }

            const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods", {

                method: "POST",

                body: formData

            });

            const data = await res.json();

            alert(data.message);

            document.getElementById("foodForm").reset();

            closeForm();

            getFoods();

        }
        async function saveUpdatedFood() {

    const id = document.getElementById("updateFoodId").value;

    const name = document.getElementById("updateFoodName").value;
    const description = document.getElementById("updateFoodDescription").value;
    const price = document.getElementById("updateFoodPrice").value;
    const category = document.getElementById("updateFoodCategory").value;
    const image = document.getElementById("updateFoodImage").files[0];

    const formData = new FormData();

    formData.append("name", name);
    formData.append("description", description);
    formData.append("price", price);
    formData.append("category", category);

    if (image) {
        formData.append("image", image);
    }

    const res = await fetch("https://food-ordering-system-production-abb0.up.railway.app/api/foods/" + id, {
        method: "PUT",
        body: formData
    });

    const data = await res.json();

    alert(data.message);

    closeUpdateForm();

    getFoods();
    loadTopRatedFoods();
}
function viewFood(id) {

    localStorage.setItem("foodId", id);

    window.location.href = "foodDetails.html";

}
    </script>

</body>

</html>
